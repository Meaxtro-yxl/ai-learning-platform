name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate Python syntax
        run: |
          python -m py_compile assets/server.py
      
      - name: Check HTML validity
        run: |
          # Basic HTML structure check
          grep -q "</html>" assets/learn.html && echo "HTML structure OK" || exit 1
      
      - name: Verify JSON files
        run: |
          python -c "import json; json.load(open('assets/course-data.json'))"

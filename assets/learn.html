let _toastTimer = null;
function showNotifyToast(msg, type, onClick) {
  let toast = document.getElementById('ai-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'ai-toast';
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;' +
      'padding:12px 20px;border-radius:10px;font-size:14px;color:#fff;cursor:pointer;' +
      'transition:opacity 0.3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
    document.body.appendChild(toast);
  }
  const colors = { success: '#4ade80', error: '#f87171', info: '#60a5fa' };
  toast.style.background = colors[type] || colors.info;
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.onclick = onClick || null;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 6000);
}

// ============================================================
// QUIZ SECTION — Count picker + generate/refresh
// ============================================================
function setupQuizSection(lessonId) {
  const quizList = document.getElementById('ai-quiz-list');
  const cached = state.summaries[lessonId];
  if (!cached) {
    quizList.innerHTML = '<div class="ai-summary-empty">暂无总结数据</div>';
    return;
  }

  // Remove old control buttons
  quizList.parentNode.querySelectorAll('.btn-ai-quiz-action').forEach(b => b.remove());

  if (cached.questions && cached.questions.length > 0) {
    _aiQuestions = cached.questions;
    renderAIQuiz(cached.questions, quizList);
    // Add refresh button
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'btn-ai-quiz-action';
    refreshBtn.textContent = '刷新题目';
    refreshBtn.addEventListener('click', () => showQuizCountPicker(lessonId, true));
    quizList.parentNode.insertBefore(refreshBtn, quizList);
  } else {
    const genBtn = document.createElement('button');
    genBtn.className = 'btn-ai-quiz-action';
    genBtn.textContent = '生成题目';
    genBtn.addEventListener('click', () => showQuizCountPicker(lessonId, false));
    quizList.innerHTML = '';
    quizList.parentNode.insertBefore(genBtn, quizList);
  }
}

function showQuizCountPicker(lessonId, isRefresh) {
  // Remove existing picker
  const existing = document.querySelector('.quiz-count-picker');
  if (existing) existing.remove();

  const picker = document.createElement('div');
  picker.className = 'quiz-count-picker';
  picker.innerHTML = `
    <div class="quiz-count-title">${isRefresh ? '刷新题目 — 选择题目数量' : '选择题目数量'}</div>
    <div class="quiz-count-options">
      <button class="quiz-count-opt" data-count="3">3 题</button>
      <button class="quiz-count-opt selected" data-count="5">5 题</button>
      <button class="quiz-count-opt" data-count="10">10 题</button>
    </div>
    <div class="quiz-count-actions">
      <button class="quiz-count-cancel">取消</button>
    </div>
  `;

  const quizList = document.getElementById('ai-quiz-list');
  quizList.parentNode.insertBefore(picker, quizList);

  // Bind option clicks
  picker.querySelectorAll('.quiz-count-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      picker.querySelectorAll('.quiz-count-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const count = parseInt(btn.dataset.count);
      picker.remove();
      generateQuiz(lessonId, count);
    });
  });

  // Bind cancel
  picker.querySelector('.quiz-count-cancel').addEventListener('click', () => picker.remove());

  // Click outside to close
  setTimeout(() => {
    const closeHandler = (e) => {
      if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', closeHandler); }
    };
    document.addEventListener('click', closeHandler);
  }, 0);
}

async function generateQuiz(lessonId, count) {
  const quizList = document.getElementById('ai-quiz-list');
  const cached = state.summaries[lessonId];
  if (!cached || !cached.transcript) {
    quizList.innerHTML = '<div class="ai-summary-empty">缺少语音转录数据，请重新进行AI总结</div>';
    return;
  }

  quizList.innerHTML = '<div class="ai-summary-empty">正在生成题目...</div>';

  // Remove old control buttons and pickers
  quizList.parentNode.querySelectorAll('.btn-ai-quiz-action, .quiz-count-picker').forEach(b => b.remove());

  try {
    const resp = await fetch('/api/ai-quiz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        transcript: cached.transcript,
        lesson_title: cached.summary ? '' : (cached.lesson_title || ''),
        stage_title: cached.summary ? '' : (cached.stage_title || ''),
        count: count,
      }),
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error);

    _aiQuestions = data.questions;
    cached.questions = data.questions;
    state.summaries[lessonId] = cached;
    saveState();

    renderAIQuiz(data.questions, quizList);

    // Add refresh button
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'btn-ai-quiz-action';
    refreshBtn.textContent = '刷新题目';
    refreshBtn.addEventListener('click', () => showQuizCountPicker(lessonId, true));
    quizList.parentNode.insertBefore(refreshBtn, quizList);
  } catch (err) {
    quizList.innerHTML = `<div class="ai-summary-empty" style="color:var(--warn);">题目生成失败: ${err.message}</div>`;
  }
}

// ============================================================
// AI SUMMARY — Render Summary
// ============================================================
function renderAISummary(summary, container) {
  if (!summary || !summary.core_points) {
    container.innerHTML = '<div class="ai-summary-empty">未能生成总结</div>';
    return;
  }

  let html = '';
  if (summary.core_points && summary.core_points.length > 0) {
    html += `<div class="ai-summary-block"><h4>核心知识点</h4><ul>${summary.core_points.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>`;
  }
  if (summary.key_difficulties && summary.key_difficulties.length > 0) {
    html += `<div class="ai-summary-block"><h4>重点难点</h4><ul>${summary.key_difficulties.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>`;
  }
  if (summary.one_liner) {
    html += `<div class="ai-summary-oneliner">${escapeHtml(summary.one_liner)}</div>`;
  }
  container.innerHTML = html;
  document.getElementById('ai-summary-progress').style.display = 'none';
}

// ============================================================
// AI SUMMARY — Render Quiz Questions
// ============================================================
function renderAIQuiz(questions, container) {
  _aiQuestions = questions || [];
  if (_aiQuestions.length === 0) {
    container.innerHTML = '<div class="ai-summary-empty">未生成题目</div>';
    return;
  }

  container.innerHTML = _aiQuestions.map((q, i) => {
    let html = `<div class="ai-question">`;
    html += `<div class="ai-q-type">${q.type === 'choice' ? '选择题' : '简答题'}${q.source_time ? ` · <span class="ai-source-link" data-time="${q.source_time}" title="跳转到视频对应片段">${q.source_time}</span>` : ''}</div>`;
    html += `<div class="ai-q-text">${i + 1}. ${escapeHtml(q.question)}</div>`;

    if (q.type === 'choice') {
      html += `<div class="ai-q-options">`;
      q.options.forEach((opt, oi) => {
        let cls = 'ai-option';
        if (q._answered) {
          if (oi === q.answer) cls += ' correct';
          else if (oi === q._userAnswer) cls += ' wrong';
        } else if (q._userAnswer === oi) {
          cls += ' selected';
        }
        html += `<div class="${cls}" data-qi="${i}" data-oi="${oi}">${escapeHtml(opt)}</div>`;
      });
      html += `</div>`;
      if (!q._answered) {
        html += `<button class="btn-ai-submit" data-qi="${i}" ${q._userAnswer === undefined ? 'disabled' : ''}>提交</button>`;
      }
      if (q._answered) {
        html += `<div class="ai-feedback ${q._correct ? 'correct' : 'wrong'}">${q._correct ? '✓ 回答正确' : '✗ 回答错误'}</div>`;
        if (!q._correct) {
          html += `<div class="ai-answer-reveal">正确答案: ${escapeHtml(q.options[q.answer])}</div>`;
        }
      }
    } else {
      if (q._answered) {
        html += `<div class="ai-answer-reveal">参考答案: ${escapeHtml(q.answer)}</div>`;
      } else {
        html += `<textarea id="ai-textarea-${i}" placeholder="输入你的回答..." style="width:100%;height:60px;background:rgba(255,255,255,0.03);border:1px solid var(--border-light);color:var(--text);border-radius:6px;padding:8px;font-size:12px;resize:vertical;margin-bottom:8px;"></textarea>`;
        html += `<button class="btn-ai-submit" data-qi="${i}">提交简答</button>`;
      }
    }
    html += `</div>`;
    return html;
  }).join('');

  // Bind option clicks
  container.querySelectorAll('.ai-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const qi = parseInt(opt.dataset.qi);
      const oi = parseInt(opt.dataset.oi);
      if (_aiQuestions[qi]._answered) return;
      container.querySelectorAll(`.ai-option[data-qi="${qi}"]`).forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      _aiQuestions[qi]._userAnswer = oi;
      const btn = container.querySelector(`.btn-ai-submit[data-qi="${qi}"]`);
      if (btn) btn.disabled = false;
    });
  });

  // Bind submit buttons
  container.querySelectorAll('.btn-ai-submit').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      const q = _aiQuestions[qi];
      if (q._answered) return;
      if (q.type === 'choice') {
        if (q._userAnswer === undefined) return;
        q._answered = true;
        q._correct = q._userAnswer === q.answer;
      } else {
        const textarea = document.getElementById(`ai-textarea-${qi}`);
        const answer = textarea?.value?.trim() || '';
        if (!answer) return;
        q._answered = true;
        q._userAnswer = answer;
        const keywords = q.answer.toLowerCase().split(/\s+/).filter(w => w.length > 1);
        const matchCount = keywords.filter(w => answer.toLowerCase().includes(w)).length;
        q._correct = keywords.length > 0 && matchCount / keywords.length >= 0.4;
      }
      renderAIQuiz(_aiQuestions, container);
    });
  });

  // Bind source time links — jump to video segment
  container.querySelectorAll('.ai-source-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.stopPropagation();
      seekVideoToTime(link.dataset.time);
    });
  });
}

// INIT
// ============================================================
// ============================================================
// BOOTSTRAP VALIDATION — catches missing IDs/functions early
// ============================================================
function validateBootstrap() {
  const requiredIds = [
    'tree-container', 'btn-theme', 'notes-col', 'btn-toggle-notes',
    'goal-lessons-row', 'goal-duration-row', 'goal-input', 'goal-duration-input',
    'search-input', 'btn-dashboard', 'btn-starred', 'btn-ai-summary',
    'dash-cards', 'stage-progress-list', 'starred-list'
  ];
  const missingIds = requiredIds.filter(id => !document.getElementById(id));
  const requiredFns = ['renderTree', 'renderDashboard', 'updateStats',
    'selectLesson', 'saveState', 'toggleNotes', 'findLesson', 'findStageName',
    'playPrevInPlaylist', 'playNextInPlaylist', 'startAISummary', 'saveGoal'];
  const missingFns = requiredFns.filter(fn => typeof window[fn] !== 'function');

  const errors = [];
  if (missingIds.length) errors.push('Missing DOM IDs: ' + missingIds.join(', '));
  if (missingFns.length) errors.push('Missing functions: ' + missingFns.join(', '));

  if (errors.length) {
    const el = document.getElementById('tree-container');
    if (el) {
      el.innerHTML = '<div style="padding:20px;color:#ef4444;font-size:14px;line-height:1.8"><b>启动失败</b><br>' +
        errors.join('<br>') + '</div>';
    }
    throw new Error('Bootstrap validation failed:\n' + errors.join('\n'));
  }
}

async function init() {
  try {
    loadState();
    validateBootstrap();

    // Load course data
    const resp = await fetch('course-data.json');
    if (!resp.ok) throw new Error('course-data.json HTTP ' + resp.status);
    COURSE_TREE = await resp.json();

    // Apply theme
    if (state.theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    document.getElementById('btn-theme').textContent = state.theme === 'light' ? '☀' : '☾';

    // Restore notes
    if (state.notesVisible) {
      document.getElementById('notes-col').style.display = 'flex';
      document.getElementById('btn-toggle-notes').classList.add('active');
    }

    // Restore goal
    document.querySelectorAll('.goal-mode-btn').forEach(b => b.classList.remove('active'));
    if (state.goalMode === 'duration') {
      document.querySelector('.goal-mode-btn[data-mode="duration"]').classList.add('active');
      document.getElementById('goal-lessons-row').classList.add('hidden');
      document.getElementById('goal-duration-row').classList.remove('hidden');
    } else {
      document.querySelector('.goal-mode-btn[data-mode="lessons"]').classList.add('active');
      document.getElementById('goal-duration-row').classList.add('hidden');
      document.getElementById('goal-lessons-row').classList.remove('hidden');
    }
    document.getElementById('goal-input').value = state.goal;
    document.getElementById('goal-duration-input').value = state.goalMinutes;

    renderTree();
    renderDashboard();
    renderContinueWatching();
    updateStats();

    // Close button for continue-watching bar
    document.getElementById('cw-close').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('continue-watching').classList.remove('visible');
    });
  } catch (e) {
    console.error('Init failed:', e.message);
  }
}

function seekVideoToTime(timeStr) {
  // Parse "MM:SS" or "HH:MM:SS" to seconds
  if (!timeStr || !videoPlayer) return;
  const parts = timeStr.split(':').map(Number);
  let seconds = 0;
  if (parts.length === 3) {
    seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
  } else if (parts.length === 2) {
    seconds = parts[0] * 60 + parts[1];
  } else {
    seconds = parts[0];
  }
  // Ensure video panel is visible (skip — no video-panel element in DOM)
  videoPlayer.currentTime = seconds;
  videoPlayer.play().catch(() => {});
  // Flash highlight feedback on the source link
  const srcLinks = document.querySelectorAll('.ai-source-link');
  srcLinks.forEach(l => l.classList.remove('flash'));
  setTimeout(() => { srcLinks.forEach(l => l.classList.remove('flash')); }, 100);
}

init();
</script>
